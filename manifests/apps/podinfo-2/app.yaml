apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-2
  namespace: demo
  labels:
    app.kubernetes.io/name: podinfo-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podinfo-2
      app.kubernetes.io/name: podinfo-2
  template:
    metadata:
      labels:
        app: podinfo-2
        app.kubernetes.io/name: podinfo-2
    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.11.0
          command:
            - ./podinfo
          args:
            - --port=9898
            - --port-metrics=9797
          ports:
            - name: http
              containerPort: 9898
            - name: metrics
              containerPort: 9797
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9898
            initialDelaySeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-2
  namespace: demo
  labels:
    app.kubernetes.io/name: podinfo-2
spec:
  selector:
    app: podinfo-2
  ports:
    - name: http
      port: 9898
      targetPort: http
    - name: metrics
      port: 9797
      targetPort: metrics
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-2
  namespace: demo
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - "podinfo-2.klawu.com"
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: x-real-ip
                value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
      backendRefs:
        - name: anubis-podinfo-2
          port: 8923
