apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kgateway-to-podinfo-2
  namespace: demo
spec:
  podSelector:
    matchLabels:
      app: podinfo-2
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - protocol: TCP
          port: 9898
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-to-podinfo-2
  namespace: demo
spec:
  podSelector:
    matchLabels:
      app: podinfo-2
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9797
