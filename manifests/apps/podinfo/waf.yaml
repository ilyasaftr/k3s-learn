apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: podinfo-waf-blocking
  namespace: demo
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: podinfo
  extAuth:
    grpc:
      backendRefs:
        - group: ""
          kind: Service
          name: coraza-ext-auth
          namespace: gateway-system
          port: 9002
    timeout: 50ms
    failOpen: false
    bodyToExtAuth:
      maxRequestBytes: 1048576
    contextExtensions:
      - name: mode
        type: Value
        value: block
