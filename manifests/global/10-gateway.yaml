apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: shared-gateway-params
  namespace: kgateway-system
spec:
  kube:
    deployment:
      replicas: 1
    envoyContainer:
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: shared-gateway-params
  listeners:
    - name: https
      hostname: "*.klawu.com"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: klawu-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      hostname: "klawu.com"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: klawu-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      hostname: "*.klawu.com"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: http-apex
      hostname: "klawu.com"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https
  namespace: kgateway-system
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: http
    - name: shared-gateway
      sectionName: http-apex
  hostnames:
    - "*.klawu.com"
    - "klawu.com"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: klawu-wildcard-cert
  namespace: kgateway-system
spec:
  secretName: klawu-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.klawu.com"
    - "klawu.com"
