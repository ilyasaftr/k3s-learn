apiVersion: apps/v1
kind: Deployment
metadata:
  name: coraza-ext-proc-block
  namespace: gateway-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coraza-ext-proc-block
      app.kubernetes.io/name: coraza-ext-proc-block
  template:
    metadata:
      labels:
        app: coraza-ext-proc-block
        app.kubernetes.io/name: coraza-ext-proc-block
    spec:
      containers:
        - name: coraza-ext-proc-block
          image: __CORAZA_EXT_PROC_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_BIND
              value: ":9002"
            - name: METRICS_BIND
              value: ":9090"
            - name: LOG_LEVEL
              value: "INFO"
            - name: WAF_MODE
              value: "block"
            - name: WAF_REQUEST_BODY_LIMIT_BYTES
              value: "1048576"
            - name: WAF_RESPONSE_BODY_LIMIT_BYTES
              value: "1048576"
          ports:
            - name: grpc
              containerPort: 9002
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: coraza-ext-proc-block
  namespace: gateway-system
  labels:
    app: coraza-ext-proc-block
    app.kubernetes.io/name: coraza-ext-proc-block
spec:
  selector:
    app: coraza-ext-proc-block
  ports:
    - name: grpc
      port: 9002
      targetPort: grpc
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: coraza-ext-proc-from-demo
  namespace: gateway-system
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: EnvoyExtensionPolicy
      namespace: demo
  to:
    - group: ""
      kind: Service
      name: coraza-ext-proc-block
