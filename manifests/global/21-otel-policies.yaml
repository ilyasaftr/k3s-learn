apiVersion: gateway.kgateway.dev/v1alpha1
kind: HTTPListenerPolicy
metadata:
  name: shared-gateway-otel
  namespace: kgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
  accessLog:
    - openTelemetry:
        grpcService:
          logName: shared-gateway-access
          backendRef:
            name: otel-collector-logs
            namespace: observability
            port: 4317
  tracing:
    randomSampling: 10
    provider:
      openTelemetry:
        grpcService:
          backendRef:
            name: otel-collector-traces
            namespace: observability
            port: 4317
        serviceName: shared-gateway
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-kgateway-policy-to-otel-collectors
  namespace: observability
spec:
  from:
    - group: gateway.kgateway.dev
      kind: HTTPListenerPolicy
      namespace: kgateway-system
  to:
    - group: ""
      kind: Service
      name: otel-collector-logs
    - group: ""
      kind: Service
      name: otel-collector-traces
