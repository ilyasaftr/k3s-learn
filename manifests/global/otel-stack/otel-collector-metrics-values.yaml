mode: deployment

fullnameOverride: otel-collector-metrics

image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
  tag: "0.147.0"

command:
  name: otelcol-contrib

alternateConfig:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  receivers:
    prometheus:
      config:
        scrape_configs:
          - job_name: envoy-gateway-proxy
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [gateway-system]
            metrics_path: /stats/prometheus
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_gateway_envoyproxy_io_owning_gateway_name]
                action: keep
                regex: shared-gateway
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                action: keep
                regex: "19001"
              - source_labels: [__address__, __meta_kubernetes_pod_container_port_number]
                action: replace
                regex: "([^:]+)(?::\\d+)?;(\\d+)"
                replacement: "$1:$2"
                target_label: __address__
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod

          - job_name: demo-app-metrics
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [demo]
            metrics_path: /metrics
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app]
                action: keep
                regex: podinfo|podinfo-2
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                action: keep
                regex: "9797"
              - source_labels: [__address__, __meta_kubernetes_pod_container_port_number]
                action: replace
                regex: "([^:]+)(?::\\d+)?;(\\d+)"
                replacement: "$1:$2"
                target_label: __address__
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
  processors:
    memory_limiter:
      check_interval: 2s
      limit_mib: 256
      spike_limit_mib: 64
    batch:
      timeout: 5s
      send_batch_size: 512
      send_batch_max_size: 1024
  exporters:
    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [prometheus]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite]

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "nodes", "nodes/proxy", "services", "endpoints"]
      verbs: ["get", "list", "watch"]
